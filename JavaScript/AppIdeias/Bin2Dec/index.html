<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bin2Dec</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section>
    <header><h1>Bin2Dec</h1></header>
    <h5>
      Binary is the number system all digital computers are based on. 
      Therefore it's important for developers to understand binary, or base 2, mathematics. 
      The purpose of Bin2Dec is to provide practice and understanding of how binary calculations.
    </h5>
    <input type="number" name="binary" id="binary" class="inputBinary" maxlength="8" placeholder="Entry a binary number">
    <div class="results"></div>
    <button id="convert">Convert</button>

  </section>


  
  <script src="bin2dec.js"></script>
</body>
</html>
